<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crosstrik | Elevata Frequenza nel Cross Training</title>
    <meta
      name="description"
      content="Esplora Crosstrik, la tua palestra di riferimento nel Valdarno per il Cross Training, Functional Training e fitness a Cavriglia. Unisciti alla nostra community!"
    />
    <link rel="icon" type="image/png" href="assets/img/logo_light.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
    <!-- SCHEMA MARKUP PER GOOGLE LOCAL BUSINESS -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ExerciseGym",
        "name": "Crosstrik",
        "image": "https://crosstrik.vercel.app/assets/img/corsi/background.png",
        "@id": "https://crosstrik.vercel.app/",
        "url": "https://crosstrik.vercel.app/",
        "description": "Crosstrik è la  palestra di riferimento per Cross Training e Functional Training situata nel Valdarno, Cavriglia. Prenota subito una lezione di prova.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Via Casa Maria 272",
          "addressLocality": "Cavriglia",
          "addressRegion": "AR",
          "postalCode": "52022",
          "addressCountry": "IT"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": "43.5205",
          "longitude": "11.4820"
        },
        "sameAs": ["https://www.instagram.com/crosstrik"]
      }
    </script>
  </head>
  <body>
    <!-- JAVASCRIPT INIETTERÀ LA NAVBAR QUI -->
    <div id="navbar-container"></div>

    <div class="container">
      <main>
        <!-- HERO -->
        <section class="hero-custom">
          <div class="hero-media">
            <!-- Non mettere lazy loading alla prima immagine! -->
            <img
              src="assets/img/background.webp"
              alt="Allenamento Cross Training a Cavriglia, Via Casa Maria 272"
            />
          </div>
          <div class="hero-overlay"></div>

          <div class="h-100 w-100 position-relative" style="z-index: 3">
            <div
              class="row h-100 align-items-center justify-content-center m-0"
            >
              <div class="col-12">
                <img
                  src="assets/img/logo_full.png"
                  alt="Logo Crosstrik"
                  class="hero-logo mb-3"
                />
                <h1 class="hero-titolo mb-2">CROSSTRIk</h1>
                <h2 class="hero-sottotitolo mb-3">
                  Cross Training & Functional Training a Cavriglia
                </h2>
                <p class="hero-testo mb-5">
                  Ti aspettiamo in Via Casa Maria 272 per superare i tuoi
                  limiti.
                </p>
              </div>
            </div>
          </div>
        </section>

        <!-- SLIDER CORSI -->
        <section id="corsi" class="sezione-custom py-4 mt-5">
          <div class="row">
            <div class="col text-center">
              <h2 class="titolo-sezione py-2">I Nostri Corsi</h2>
            </div>
          </div>
          <div class="swiper swiper-corsi">
            <div class="swiper-wrapper mb-4" id="slider-corsi-wrapper"></div>
            <div class="swiper-pagination"></div>
          </div>
          <div class="text-center mt-4">
            <a href="corsi.html#lista-corsi" class="bottone"
              >Scopri tutti i corsi</a
            >
          </div>
        </section>

        <!-- SLIDER COACH -->
        <section id="chi-siamo" class="sezione-custom py-4 mt-5">
          <div class="row">
            <div class="col text-center">
              <h2 class="titolo-sezione py-2">Il Nostro Team</h2>
            </div>
          </div>
          <div class="swiper swiper-coach">
            <div class="swiper-wrapper mb-4" id="slider-coach-wrapper"></div>
            <div class="swiper-pagination"></div>
          </div>
          <div class="text-center mt-4">
            <a href="coach.html#lista-coach" class="bottone"
              >Conosci tutto il team</a
            >
          </div>
        </section>
      </main>
    </div>

    <!-- FINE CONTENITORE PRINCIPALE -->
    <!-- Il footer include Instagram + Sponsor + Footer -->
    <div id="footer-container"></div>
    <script src="https://elfsightcdn.com/platform.js" async></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
